<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cafe Control</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">

<h1 class="logo">☕ Cafe Control</h1>

<input id="email" placeholder="Usuario o Correo">

<input id="password" type="password" placeholder="Contraseña">

<button id="btnLogin" class="btn-login">
INICIAR SESIÓN
</button>

<p id="resetPassword" class="link">
¿Olvidaste tu contraseña?
</p>

</div>


<!-- PANEL APP -->
<div id="appBox" class="card hidden">

<h1 class="logo">☕ Cafe Control</h1>

<p id="mensaje" class="mensaje">
Tu jornada aún no ha comenzado
</p>

<div class="botones">

<button id="btnAsistencia" class="btn-verde">
Registrar ingreso
</button>

<button id="btnBreak" class="btn-disabled">
Iniciar break
</button>

</div>

<button id="btnLogout" class="logout">
Cerrar sesión
</button>

</div>


<script type="module" src="app.js"></script>

</body>
</html>
