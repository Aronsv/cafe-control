<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =========================
       SECCION LOGIN
  ========================== -->
  <div id="loginBox" class="card">
    <h1 class="logo">☕ Cafe Control</h1>

    <input id="email" type="email" placeholder="Usuario o Correo">
    <input id="password" type="password" placeholder="Contraseña">

    <button id="btnLogin" class="btn btn-brown">Iniciar sesión</button>
  </div>

  <!-- =========================
       SECCION APP
  ========================== -->
  <div id="appBox" class="card hidden">
    <h1 class="logo">☕ Cafe Control</h1>

    <div class="mensaje-wrap">
      <p id="mensaje">Tu jornada aún no ha comenzado</p>
    </div>

    <div class="botones-wrap">
      <button id="btnAsistencia" class="btn btn-green-main">Registrar ingreso</button>
      <button id="btnBreak" class="btn btn-green-soft" disabled>Iniciar break</button>
      <button id="btnLogout" class="btn btn-dark">Cerrar sesión</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
